name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  EM_VERSION: 3.1.56

jobs:
  # ─── Lint & Format ─────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Check C formatting (clang-format)
        run: |
          sudo apt-get install -y clang-format
          find kernel bootloader drivers services -name '*.c' -o -name '*.h' | head -20
          clang-format --dry-run --Werror kernel/src/*.c kernel/src/*.h bootloader/src/*.c bootloader/src/*.h 2>&1 || true
          echo "C format check (non-blocking for now)"
      
      - name: Check TypeScript formatting
        run: |
          npm install -g prettier
          find host desktop -name '*.ts' -exec prettier --check {} \; 2>&1 || true
          echo "TypeScript format check (non-blocking for now)"

  # ─── C Unit Tests ──────────────────────────────────
  c-tests:
    name: C Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get install -y gcc make python3
      
      - name: Run C tests
        run: |
          cd tests
          make c-tests
      
      - name: Run Python tool tests
        run: |
          cd tests
          make py-tests
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c-test-results
          path: tests/

  # ─── Build WASM Modules ────────────────────────────
  build-wasm:
    name: Build WASM Modules
    runs-on: ubuntu-latest
    needs: c-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EM_VERSION }}
          actions-cache-folder: 'emsdk-cache'
      
      - name: Verify Emscripten
        run: emcc --version
      
      - name: Build bootloader
        run: |
          cd bootloader && make
        continue-on-error: true
      
      - name: Build kernel
        run: |
          cd kernel && make
        continue-on-error: true
      
      - name: Build drivers
        run: |
          cd drivers && make
        continue-on-error: true
      
      - name: Build services
        run: |
          cd services && make
        continue-on-error: true
      
      - name: Build apps
        run: |
          cd apps && make
        continue-on-error: true
      
      - name: List built WASM files
        run: ls -la public/wasm/ || echo "No WASM files built yet"
      
      - name: Upload WASM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-modules
          path: public/wasm/

  # ─── Build Host ────────────────────────────────────
  build-host:
    name: Build TypeScript Host
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install & build host
        run: |
          cd host && npm install && npm run build
        continue-on-error: true
      
      - name: Build desktop
        run: |
          cd desktop && npm install && npm run build
        continue-on-error: true

  # ─── Build Site ────────────────────────────────────
  build-site:
    name: Build Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install & build site
        run: |
          cd site && npm install && npm run build
        continue-on-error: true

  # ─── Build ISO ─────────────────────────────────────
  build-iso:
    name: Build ISO Image
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      
      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: public/wasm/
      
      - name: Install ISO build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso grub-pc-bin grub-common mtools
      
      - name: Build ISO
        run: |
          chmod +x tools/build_iso.sh
          ./tools/build_iso.sh
        continue-on-error: true
      
      - name: Upload ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webos-iso
          path: dist/webos-0.0.b.iso

  # ─── Integration Test ──────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-modules
          path: public/wasm/
      
      - name: Run integration tests
        run: |
          cd tests && make ts-tests
        continue-on-error: true

  # ─── Summary ───────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, c-tests, build-wasm, build-host, build-site]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C Tests | ${{ needs.c-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build WASM | ${{ needs.build-wasm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Host | ${{ needs.build-host.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Site | ${{ needs.build-site.result }} |" >> $GITHUB_STEP_SUMMARY
