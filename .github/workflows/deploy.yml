name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml
    
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.56
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Build all WASM modules
        run: make all
      
      - name: Build host
        run: cd host && npm install && npm run build
      
      - name: Build site
        run: cd site && npm install && npm run build
        env:
          GITHUB_PAGES: 1
      
      - name: Merge artifacts
        run: |
          mkdir -p deploy
          cp -r site/out/* deploy/
          cp -r public/wasm deploy/wasm
          cp -r public/wallpapers deploy/wallpapers
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
